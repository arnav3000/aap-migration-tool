# Markdownlint configuration for AAP Bridge
# https://github.com/DavidAnson/markdownlint

# Default state for all rules
default: true

# MD013/line-length - Disabled; long lines are common in docs with URLs and tables
MD013: false

# MD033/no-inline-html - Allow HTML in markdown (for badges, details/summary, etc.)
MD033:
  allowed_elements: ["div", "span", "br", "details", "summary", "img"]

# MD041/first-line-heading - Don't require H1 as first line (allows front matter)
MD041: false

# MD024/no-duplicate-heading - Allow duplicate headings in different sections (changelogs)
MD024:
  siblings_only: true

# MD046/code-block-style - Prefer fenced code blocks
MD046:
  style: fenced

# MD036/no-emphasis-as-heading - Allow emphasis instead of headings
MD036: false

# MD040/fenced-code-language - Disabled; not all code blocks need a language tag
MD040: false
