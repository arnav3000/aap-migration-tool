name: Containerized Regression Tests

on:
#  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: containerized-tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  regression-tests:
    name: Run Full Containerized Test Suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman

      - name: Verify Podman
        run: |
          podman --version
          podman info

      - name: Run containerized regression suite
        run: make c-test-all
