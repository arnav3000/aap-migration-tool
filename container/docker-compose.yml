version: '3.8'

networks:
  app:
    driver: bridge

services:
  # PostgreSQL database
  db:
    image: registry.redhat.io/rhel9/postgresql-15:latest
    container_name: aap-db
    networks:
    - app
    environment:
      POSTGRESQL_USER: aap_user
      POSTGRESQL_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRESQL_DATABASE: aap_migration
    volumes:
    - postgres-data:/var/lib/pgsql/data
    expose:
    - "5432"
    restart: unless-stopped
    healthcheck:
      test: [CMD-SHELL, pg_isready -U aap_user -d aap_migration]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI backend (serves the API for the UI)
  engine:
    build:
      context: ..
      dockerfile: container/Containerfile.api
    image: aap-bridge-api:latest
    container_name: aap-engine
    networks:
    - app
    depends_on:
      db:
        condition: service_healthy
    environment:
      MIGRATION_STATE_DB_PATH: ${MIGRATION_STATE_DB_PATH:?set MIGRATION_STATE_DB_PATH in container/.env}
      AAP_TOKEN_ENCRYPTION_KEY: ${AAP_TOKEN_ENCRYPTION_KEY:?set AAP_TOKEN_ENCRYPTION_KEY in container/.env}
    volumes:
    - ./volumes/logs:/app/logs:Z
    - ./volumes/exports:/app/exports:Z
    - ./volumes/xformed:/app/xformed:Z
    - ./volumes/database:/app/database:Z
    expose:
    - "8000"
    restart: unless-stopped
    healthcheck:
      test: [CMD, python3.12, -c, import urllib.request; urllib.request.urlopen('http://localhost:8000/api/jobs')]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 10s

  # React UI served by nginx
  ui:
    build:
      context: ..
      dockerfile: container/Containerfile.ui
    image: aap-bridge-ui:latest
    container_name: aap-ui
    networks:
    - app
    depends_on:
      engine:
        condition: service_healthy
    environment:
      BASIC_AUTH_ENABLED: ${BASIC_AUTH_ENABLED:-false}
      BASIC_AUTH_REALM: ${BASIC_AUTH_REALM:-AAP Bridge}
      BASIC_AUTH_USER_FILE: ${BASIC_AUTH_USER_FILE:-/etc/nginx/auth/.htpasswd}
    volumes:
    - ./volumes/auth:/etc/nginx/auth:Z,ro
    ports:
    - 8080:8080
    restart: unless-stopped
    healthcheck:
      test: [CMD, curl, -f, http://localhost:8080/healthz]
      interval: 15s
      timeout: 5s
      retries: 3

  # CLI container (for users who want to exec in and run CLI commands)
  bridge:
    build:
      context: ..
      dockerfile: container/Containerfile
      args:
        BRANCH: main
        APP_VERSION: 0.5.4
    image: aap-bridge:latest
    container_name: aap-bridge
    networks:
    - app
    depends_on:
      db:
        condition: service_healthy
    env_file:
    - .env
    environment:
      MIGRATION_STATE_DB_PATH: ${MIGRATION_STATE_DB_PATH:?set MIGRATION_STATE_DB_PATH in container/.env}
    volumes:
    - ./volumes/database:/app/aap-bridge/database:Z
    - ./volumes/logs:/app/aap-bridge/logs:Z
    - ./volumes/exports:/app/aap-bridge/exports:Z
    - ./volumes/xformed:/app/aap-bridge/xformed:Z
    - ./volumes/config:/app/aap-bridge/config:Z
    restart: unless-stopped
    command: tail -f /dev/null
    healthcheck:
      test: [CMD, python3, -c, import sys; sys.exit(0)]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres-data:
    driver: local

# Usage:
# ======
# 1. Copy .env.container to .env and customize your credentials
# 2. Create volumes: mkdir -p volumes/{database,logs,exports,xformed,config,auth}
#
# Full stack (UI + API + DB + CLI):
#   podman-compose up -d
#   # UI at http://localhost:8080
#   # API is available only through the UI reverse proxy
#
# CLI only (exec into bridge container):
#   podman-compose up -d db bridge
#   podman exec -it aap-bridge bash
#   aap-bridge export -y && aap-bridge transform -y && aap-bridge import -y
