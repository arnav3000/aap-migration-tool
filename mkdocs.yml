site_name: AAP Migration Tool
site_description: Production-grade migration tool for Ansible Automation Platform
site_author: Antony Sallas
repo_url: https://github.com/arnav3000/aap-migration-tool
repo_name: arnav3000/aap-migration-tool

theme:
  name: material
  icon:
    repo: fontawesome/brands/github
  features:
  - navigation.tabs
  - navigation.sections
  - navigation.top
  - toc.integrate
  - search.suggest
  - search.highlight
  palette:
  - scheme: default
    primary: red
    accent: red
    toggle:
      icon: material/brightness-7
      name: Switch to dark mode
  - scheme: slate
    primary: red
    accent: red
    toggle:
      icon: material/brightness-4
      name: Switch to light mode

nav:
- Home: index.md
- Architecture: architecture.md
- Quick Start:
  - Local Install: quickstart-local.md
  - Containerized CLI: quickstart-container-cli.md
  - Web UI: quickstart-web.md

markdown_extensions:
- admonition
- attr_list
- md_in_html
- pymdownx.details
- pymdownx.highlight:
    anchor_linenums: true
- pymdownx.inlinehilite
- pymdownx.snippets
- pymdownx.superfences:
    custom_fences:
    - name: mermaid
      class: mermaid
      format: !!python/name:pymdownx.superfences.fence_code_format
- pymdownx.tabbed:
    alternate_style: true
- toc:
    permalink: true
- tables
- pymdownx.emoji:
    emoji_index: !!python/name:material.extensions.emoji.twemoji
    emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
- search

extra_javascript:
- path: javascripts/mermaid.js
  type: module
